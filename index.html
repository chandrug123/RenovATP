<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RenovaTP - Home Services</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      overflow-x: hidden;
    }

    /* NAVBAR */
    nav {
      display: flex;
      justify-content: space-between;
      padding: 20px 10%;
      position: fixed;
      width: 100%;
      top: 0;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(10px);
      z-index: 1000;
    }

    nav h1 {
      color: #38bdf8;
    }

    nav a {
      color: white;
      margin-left: 20px;
      text-decoration: none;
      font-weight: 500;
    }

    /* HERO */
    .hero {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 0 20px;
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    .hero h2 {
      font-size: 3rem;
      animation: fadeUp 1s ease forwards;
    }

    .hero p {
      margin-top: 15px;
      font-size: 1.2rem;
      color: #cbd5f5;
      animation: fadeUp 1.5s ease forwards;
    }

    .hero button {
      margin-top: 25px;
      padding: 12px 30px;
      border: none;
      background: #38bdf8;
      color: black;
      font-weight: bold;
      border-radius: 30px;
      cursor: pointer;
      transition: 0.3s;
      animation: fadeUp 2s ease forwards;
    }

    .hero button:hover {
      transform: scale(1.1);
      background: #0ea5e9;
    }

    /* SERVICES */
    .services {
      padding: 80px 10%;
      text-align: center;
    }

    .services h2 {
      margin-bottom: 40px;
      font-size: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      transition: 0.3s;
      transform: translateY(50px);
      opacity: 0;
    }

    .card:hover {
      transform: translateY(-10px);
      background: #334155;
    }

    /* FOOTER */
    footer {
      padding: 30px;
      text-align: center;
      background: #020617;
      color: #94a3b8;
    }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>

<body>

  <!-- NAVBAR -->
  <nav>
    <h1>RenovaTP</h1>
    <div>
      <a href="#">Home</a>
      <a href="#services">Services</a>
      <a href="#">Contact</a>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <h2>Expert Home Renovation Services</h2>
    <p>Electrical, Plumbing, Painting, Carpentry & More</p>
    <button onclick="scrollToServices()">Explore Services</button>
  </section>

  <!-- SERVICES -->
  <section id="services" class="services">
    <h2>Our Services</h2>
    <div class="grid">
      <div class="card">⚡ Electrical Work</div>
      <div class="card">🚿 Plumbing</div>
      <div class="card">🎨 Painting</div>
      <div class="card">🪵 Carpentry</div>
      <div class="card">🏗 Civil Work</div>
      <div class="card">🛠 Repairs</div>
    </div>
  </section>

  <!-- FOOTER -->
  <footer>
    © 2026 RenovaTP | All Rights Reserved
  </footer>

  <!-- SCRIPT -->
  <script>
    function scrollToServices() {
      document.getElementById("services").scrollIntoView({
        behavior: "smooth"
      });
    }

    // Scroll animation
    const cards = document.querySelectorAll(".card");

    window.addEventListener("scroll", () => {
      cards.forEach(card => {
        const top = card.getBoundingClientRect().top;
        if (top < window.innerHeight - 50) {
          card.style.opacity = "1";
          card.style.transform = "translateY(0)";
        }
      });
    });
  </script>

</body>
</html>
