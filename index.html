<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RenovaTP - Coming Soon</title>

  <!-- Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: white;
      overflow: hidden;
    }

    .container {
      text-align: center;
      z-index: 2;
    }

    h1 {
      font-size: 3rem;
      letter-spacing: 2px;
      color: #38bdf8;
      animation: glow 2s infinite alternate;
    }

    h2 {
      margin-top: 10px;
      font-size: 2rem;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards 0.5s;
    }

    p {
      margin-top: 15px;
      color: #94a3b8;
      opacity: 0;
      animation: fadeUp 2s ease forwards 1s;
    }

    .loader {
      margin: 30px auto;
      width: 120px;
      height: 120px;
      border: 3px solid transparent;
      border-top: 3px solid #38bdf8;
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }

    /* Floating particles */
    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(56,189,248,0.1);
      animation: float 10s infinite linear;
    }

    /* Animations */
    @keyframes spin {
      0% { transform: rotate(0); }
      100% { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #38bdf8;
      }
      to {
        text-shadow: 0 0 30px #0ea5e9;
      }
    }

    @keyframes float {
      0% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-100vh) scale(1.5);
      }
      100% {
        transform: translateY(0) scale(1);
      }
    }

  </style>
</head>

<body>

  <!-- Floating circles -->
  <div class="circle" style="width:100px;height:100px;left:10%;animation-duration:12s;"></div>
  <div class="circle" style="width:60px;height:60px;left:70%;animation-duration:8s;"></div>
  <div class="circle" style="width:80px;height:80px;left:40%;animation-duration:10s;"></div>

  <div class="container">
    <h1>RenovaTP</h1>
    <h2>Coming Soon</h2>
    <p>We are building something amazing for home services 🚀</p>

    <div class="loader"></div>
  </div>

</body>
</html>
